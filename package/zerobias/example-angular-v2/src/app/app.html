<mat-toolbar class="app-toolbar">
  <span class="brand">
    <img class="brand-icon" src="app-icon.svg" alt="ZeroBias" width="36" height="36" />
    <span class="brand-name">ZeroBias</span>
    <span class="brand-sub">v2 Example &middot; Angular</span>
  </span>

  <span class="spacer"></span>

  <app-user-menu />
</mat-toolbar>
<div class="zb-ui-bar"></div>

<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened class="app-rail" aria-label="Demos">
    <nav>
      @for (item of navItems; track item.path) {
        <a
          class="rail-link"
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        >
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
