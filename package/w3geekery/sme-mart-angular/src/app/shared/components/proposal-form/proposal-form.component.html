<h2 mat-dialog-title>Submit a Proposal</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="proposal-form">
    <mat-form-field appearance="outline">
      <mat-label>Cover Letter</mat-label>
      <textarea matInput formControlName="cover_letter" rows="4"
        placeholder="Describe your approach and why you're a good fit..."></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Proposed Price ($)</mat-label>
      <input matInput formControlName="proposed_price" type="number" min="0" />
      <span matTextPrefix>$&nbsp;</span>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Proposed Timeline</mat-label>
      <input matInput formControlName="proposed_timeline" placeholder="e.g., 2 weeks" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="submitting">
    {{ submitting ? 'Submitting...' : 'Submit Proposal' }}
  </button>
</mat-dialog-actions>
