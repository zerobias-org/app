<div class="provider-list-page">
  <!-- Toolbar -->
  <div class="list-toolbar">
    <button mat-icon-button (click)="toggleDrawer()" aria-label="Toggle filters"
      [matBadge]="activeFilterCount()" matBadgeColor="primary" matBadgeSize="small" [matBadgeHidden]="activeFilterCount() === 0">
      <mat-icon>filter_alt</mat-icon>
    </button>

    <zb-search-input
      class="search-input"
      placeholder="Search providers..."
      [value]="searchTerm()"
      (search)="onSearch($event)"
    />

    <mat-form-field appearance="outline" class="sort-select" subscriptSizing="dynamic">
      <mat-select [(value)]="sortBy">
        <mat-option value="name">Name</mat-option>
        <mat-option value="rating">Rating</mat-option>
        <mat-option value="jobs">Jobs completed</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <!-- Content with filter drawer -->
  <mat-sidenav-container class="provider-list-container">
    <mat-sidenav
      #filterDrawer
      mode="side"
      [opened]="drawerOpen()"
      position="start"
      class="filter-sidebar"
    >
      <app-catalog-filters
        [enabledFilters]="enabledFilters()"
        [selectedFilters]="catalogFilters()"
        (filtersChange)="onFiltersChange($event)"
        (enabledChange)="onEnabledChange($event)"
      />
    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      @if (loading()) {
        <zb-empty-state-container [loading]="true" />
      } @else if (filteredProviders().length) {
        <div class="results-count">{{ filteredProviders().length }} providers found</div>
        <div class="provider-grid">
          @for (provider of filteredProviders(); track provider.id) {
            <app-provider-card [provider]="provider" />
          }
        </div>
      } @else {
        <zb-empty-state-container [loading]="false" emptyText="No providers match your filters" />
      }
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
