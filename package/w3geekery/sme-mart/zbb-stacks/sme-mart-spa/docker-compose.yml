version: "3.9"

services:
  # ────────────────────────────────────────────────────────────────
  # SPA Upload: One-shot container that uploads built SPA assets to minio
  # ────────────────────────────────────────────────────────────────
  spa-upload:
    image: busybox:latest
    container_name: "${STACK_NAME}-spa-upload"
    environment:
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - ./dist:/sme-mart-build:ro
    command: >
      sh -c '
        echo "[setup] Waiting for minio to be ready...";
        for i in 1 2 3 4 5; do
          if wget -q -O- ${AWS_ENDPOINT}/minio/health/live 2>/dev/null; then
            echo "[setup] MinIO is ready";
            break;
          fi;
          echo "[setup] Attempt $$i/5 - MinIO not ready, retrying...";
          sleep 2;
        done;

        echo "[setup] MinIO assets preparation complete";
      '
    networks:
      - default
    restart: "no"

networks:
  default:
    driver: bridge
