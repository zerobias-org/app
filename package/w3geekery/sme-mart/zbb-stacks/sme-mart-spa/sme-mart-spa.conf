location /sme-mart/ {
  # Proxy to minio bucket (contains static SPA files)
  proxy_pass http://minio/sme-mart-app/;

  # SPA deep-route fallback: 404 on missing file -> /sme-mart/index.html
  # Enables routing like /sme-mart/rfps/abc123 -> index.html -> router handles it
  error_page 404 =200 /sme-mart/index.html;

  # Standard proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

  # Don't buffer responses (allow streaming for large files)
  proxy_buffering off;
}
