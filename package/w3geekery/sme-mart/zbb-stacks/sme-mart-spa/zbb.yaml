# ──────────────────────────────────────────────────────────────────────
# SME Mart SPA Stack Manifest
# ──────────────────────────────────────────────────────────────────────
# SPA build uploaded to minio, served via cloudfront-sim (nginx with
# try_files fallback). No hub-server, postgres, or registry — those
# are deferred to backlog (LS-02).

name: "sme-mart-spa"
version: "1.0.0"

# ── Dependencies ─────────────────────────────────────────────────────
depends:
  minio:
    package: "@zerobias-com/minio@^1.0.0"
    ready_when:
      status: healthy
  cloudfront-sim:
    package: "./cloudfront-sim"
    ready_when:
      status: healthy

# ── What SME Mart SPA exports to consumers ───────────────────────────
exports:
  - CLOUDFRONT_SIM_URL
  - CLOUDFRONT_SIM_PORT

# ── What SME Mart SPA imports from dependencies ──────────────────────
imports:
  minio:
    - AWS_ENDPOINT
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
  cloudfront-sim:
    - CLOUDFRONT_SIM_PORT as PROXY_PORT
    - CLOUDFRONT_SIM_URL

# ── Sub-stacks ───────────────────────────────────────────────────────
substacks:
  spa-assets:
    compose: docker-compose.yml
    services: [spa-upload]
    depends: [minio]
    description: "One-shot SPA asset upload container (exits after completion)"

# ── Environment schema ───────────────────────────────────────────────
env:
  # ── Service Ports ──────────────────────────────────────────
  CLOUDFRONT_SIM_PORT:
    type: port
    description: CloudFront-sim reverse proxy host port

  # ── Derived URLs ───────────────────────────────────────────
  CLOUDFRONT_SIM_URL:
    type: string
    value: "http://localhost:${PROXY_PORT}"
    description: CloudFront-sim reverse proxy URL (aliased from CLOUDFRONT_SIM_PORT)

  # ── SPA Build Configuration ────────────────────────────────
  SPA_BUILD_DIR:
    type: string
    default: "dist/"
    description: SPA build output directory (relative to sme-mart app root)

  MINIO_BUCKET:
    type: string
    default: "sme-mart-app"
    description: MinIO bucket name for SPA assets

  # ── Imported from dependencies ────────────────────────────
  AWS_ENDPOINT:
    type: string
    description: MinIO endpoint URL (imported from minio stack)

  AWS_ACCESS_KEY_ID:
    type: secret
    description: MinIO access key (imported from minio stack)

  AWS_SECRET_ACCESS_KEY:
    type: secret
    description: MinIO secret key (imported from minio stack)

# ── State ────────────────────────────────────────────────────────────
state:
  status:
    type: enum
    values: [starting, healthy, degraded, stopped, error]
  services:
    minio:
      type: string
      description: MinIO service status
    cloudfront-sim:
      type: string
      description: CloudFront simulator service status

# ── Lifecycle ────────────────────────────────────────────────────────
lifecycle:
  build: "cd /Users/cstacer/Projects/w3geekery/zerobias-org-forks/app/package/w3geekery/sme-mart && npm run build"
  start: "bash setup.sh && docker compose -f docker-compose.yml -p ${STACK_NAME} up -d"
  stop: "docker stop ${STACK_NAME}-spa-upload 2>/dev/null; docker rm ${STACK_NAME}-spa-upload 2>/dev/null; true"
  health:
    command: "curl -sf http://localhost:${PROXY_PORT}/ >/dev/null"
    interval: 3
    timeout: 30
  cleanup:
    - "docker stop ${STACK_NAME}-spa-upload 2>/dev/null; docker rm ${STACK_NAME}-spa-upload 2>/dev/null; true"
    - "rm -rf ${SPA_BUILD_DIR}"

# ── Logs routing ─────────────────────────────────────────────────────
logs:
  spa-upload:
    source: docker
    container: "${STACK_NAME}-spa-upload"
