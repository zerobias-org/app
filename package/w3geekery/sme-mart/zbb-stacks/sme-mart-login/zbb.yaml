# ──────────────────────────────────────────────────────────────────────
# SME Mart Login Stack Manifest
# ──────────────────────────────────────────────────────────────────────
# Login stack builds and serves the login UI from zerobias-org-forks/login
# (w3geekery package) via the shared cloudfront-sim reverse proxy.
#
# Reuses cloudfront-sim from Wave 1 (sme-mart-spa); separate minio bucket
# for login assets (sme-mart-login) to isolate from SPA assets.

name: "sme-mart-login"
version: "1.0.0"

# ── Dependencies ─────────────────────────────────────────────────────
# Login stack depends on cloudfront-sim for nginx proxy.
# cloudfront-sim depends on minio, so minio is implicitly available.
depends:
  cloudfront-sim:
    package: "./cloudfront-sim"
    ready_when:
      status: healthy

# ── What Login Stack exports to consumers ────────────────────────────
exports:
  - LOGIN_URL
  - CLOUDFRONT_SIM_URL

# ── What Login Stack imports from cloudfront-sim ─────────────────────
imports:
  cloudfront-sim:
    - CLOUDFRONT_SIM_PORT as PROXY_PORT
    - CLOUDFRONT_SIM_URL
    - AWS_ENDPOINT
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY

# ── Sub-stacks ───────────────────────────────────────────────────────
substacks:
  login-assets:
    compose: docker-compose.yml
    services: [login-upload]
    depends: [cloudfront-sim]
    description: "One-shot login asset upload container (builds login repo, uploads to minio)"

# ── Environment schema ───────────────────────────────────────────────
env:
  # ── Service Ports ──────────────────────────────────────────
  CLOUDFRONT_SIM_PORT:
    type: port
    description: CloudFront-sim reverse proxy host port (imported from cloudfront-sim)

  # ── Derived URLs ───────────────────────────────────────────
  CLOUDFRONT_SIM_URL:
    type: string
    description: CloudFront-sim reverse proxy URL (imported from cloudfront-sim)

  LOGIN_URL:
    type: string
    value: "http://localhost:${PROXY_PORT}/auth/"
    description: Public URL for login page (served via cloudfront-sim)

  # ── Login Build Configuration ──────────────────────────────
  LOGIN_BUILD_DIR:
    type: string
    default: "dist/"
    description: Login repo build output directory (relative to login/package/w3geekery/)

  LOGIN_REPO_PATH:
    type: string
    default: "/Users/cstacer/Projects/w3geekery/zerobias-org-forks/login"
    description: Absolute path to login repository

  MINIO_BUCKET:
    type: string
    default: "sme-mart-login"
    description: MinIO bucket name for login assets (separate from SPA bucket sme-mart-app)

  # ── Imported from cloudfront-sim ───────────────────────────
  AWS_ENDPOINT:
    type: string
    description: MinIO endpoint URL (imported from cloudfront-sim)

  AWS_ACCESS_KEY_ID:
    type: secret
    description: MinIO access key (imported from cloudfront-sim)

  AWS_SECRET_ACCESS_KEY:
    type: secret
    description: MinIO secret key (imported from cloudfront-sim)

# ── State ────────────────────────────────────────────────────────────
state:
  status:
    type: enum
    values: [starting, healthy, degraded, stopped, error]
  services:
    cloudfront-sim:
      type: string
      description: CloudFront simulator (nginx) service status
    login-upload:
      type: string
      description: Login asset upload container status

# ── Lifecycle ────────────────────────────────────────────────────────
lifecycle:
  build: "cd ${LOGIN_REPO_PATH}/package/w3geekery && npm run build"
  start: "bash setup.sh && docker compose -f docker-compose.yml -p ${STACK_NAME} up -d"
  stop: "docker stop ${STACK_NAME}-login-upload 2>/dev/null; docker rm ${STACK_NAME}-login-upload 2>/dev/null; true"
  health:
    command: "curl -sf http://localhost:${PROXY_PORT}/auth/ >/dev/null"
    interval: 3
    timeout: 30
  cleanup:
    - "docker stop ${STACK_NAME}-login-upload 2>/dev/null; docker rm ${STACK_NAME}-login-upload 2>/dev/null; true"
    - "rm -rf ${LOGIN_REPO_PATH}/package/w3geekery/${LOGIN_BUILD_DIR}"

# ── Logs routing ─────────────────────────────────────────────────────
logs:
  login-upload:
    source: docker
    container: "${STACK_NAME}-login-upload"
