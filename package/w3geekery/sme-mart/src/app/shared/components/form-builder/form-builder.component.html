<div class="form-builder">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Define Fields</mat-card-title>
      <mat-card-subtitle>Add and configure fields for vendor submissions</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (fieldWarning()) {
        <div class="warning-banner">
          <mat-icon>info</mat-icon>
          <p>{{ fieldWarning() }}</p>
        </div>
      }

      <div class="field-list" cdkDropList (cdkDropListDropped)="onFieldsReordered($event)">
        @for (field of fields(); track field.id; let i = $index) {
          <div cdkDrag class="field-item">
            <mat-expansion-panel [disabled]="isLocked()">
              <mat-expansion-panel-header>
                <div class="panel-header">
                  <span class="drag-handle" cdkDragHandle>
                    <mat-icon>drag_indicator</mat-icon>
                  </span>
                  <div class="field-info">
                    <strong>{{ field.label || '(Untitled)' }}</strong>
                    <span class="field-type">{{ field.type }}</span>
                  </div>
                  @if (field.required) {
                    <span class="required-badge">Required</span>
                  }
                </div>
              </mat-expansion-panel-header>

              <app-form-field-editor
                [field]="field"
                [isLocked]="isLocked()"
                (fieldChange)="onFieldChange(i, $event)"
                (fieldDelete)="onFieldDelete(i)"
              ></app-form-field-editor>
            </mat-expansion-panel>
          </div>
        }
      </div>

      <button
        mat-raised-button
        color="primary"
        (click)="addField()"
        [disabled]="isLocked()"
        class="add-field-button"
      >
        <mat-icon>add</mat-icon>
        Add Field
      </button>
    </mat-card-content>
  </mat-card>
</div>
