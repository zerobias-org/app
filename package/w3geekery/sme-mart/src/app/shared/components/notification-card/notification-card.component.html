<div
  class="notification-card"
  [class.unread]="isUnread()"
  (click)="toggleExpand()"
>
  <!-- Prefix: type icon + severity bar -->
  <div class="card-prefix">
    <mat-icon class="type-icon">{{ typeIcon() }}</mat-icon>
    <span class="severity-bar" [style.background-color]="severityColor()"></span>
  </div>

  <!-- Content: title + description -->
  <div class="card-content">
    <span class="card-title" [class.bold]="isUnread()">{{ notification().title }}</span>
    @if (notification().description && !expanded()) {
      <span class="card-description">{{ notification().description }}</span>
    }
    @if (notification().description && expanded()) {
      <span class="card-description expanded">{{ notification().description }}</span>
    }
  </div>

  <!-- Suffix: timestamp + chevron -->
  <div class="card-suffix">
    <span class="card-time">{{ relativeTime() }}</span>
    <mat-icon class="expand-icon" [class.rotated]="expanded()">expand_more</mat-icon>
  </div>
</div>

<!-- Expansion: action buttons -->
@if (expanded()) {
  <div class="card-actions">
    <button mat-button color="warn" (click)="onDismiss($event)">
      <mat-icon>close</mat-icon>
      Dismiss
    </button>
    @if (hasResource()) {
      <button mat-button color="primary" (click)="onNavigate($event)">
        <mat-icon>open_in_new</mat-icon>
        Go
      </button>
    }
  </div>
}
