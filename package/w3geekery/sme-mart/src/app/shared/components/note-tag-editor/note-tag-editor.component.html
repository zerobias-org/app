<mat-form-field appearance="outline" class="tag-field" subscriptSizing="dynamic">
  <mat-chip-grid #chipGrid>
    @for (tag of assignedTags(); track tag.id) {
      <mat-chip-row (removed)="onChipRemoved(tag)">
        {{ tag.name }}
        <button matChipRemove>
          <mat-icon>cancel</mat-icon>
        </button>
      </mat-chip-row>
    }
  </mat-chip-grid>

  <input #tagInput
         placeholder="Add tag…"
         [formControl]="tagCtrl"
         [matChipInputFor]="chipGrid"
         [matChipInputSeparatorKeyCodes]="separatorKeyCodes"
         (matChipInputTokenEnd)="onChipInput($event)"
         [matAutocomplete]="auto">

  <mat-autocomplete #auto="matAutocomplete"
                    (optionSelected)="onSelected($event)"
                    [displayWith]="displayFn">
    @for (tag of filteredTags(); track tag.id) {
      <mat-option [value]="tag">{{ tag.name }}</mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
