name: Test and Lint (sme-mart)

# Runs on pull_request to ANY base branch and on push to feature branches.
# Deployment branches (main/uat/qa/prod) are excluded from push trigger because
# they're reached via PR review (which already runs this workflow). Director
# directive 2026-05-01: dev is NOT and never will be a deploy path for any 3P
# customer app in zerobias-org/app — see DEV-CI-PURGE-1 for the broader sweep.

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - uat
      - qa
      - prod

permissions:
  contents: read
  id-token: write  # required for Vault JWT auth

defaults:
  run:
    working-directory: package/w3geekery/sme-mart

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    # Job-level env mirrors zb/ui's pr-develop-tests.yml — needed by .npmrc
    # auth tokens at install time. Vault override applied per-step below.
    env:
      NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ZB_TOKEN: ${{ secrets.ZB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package/w3geekery/sme-mart/.nvmrc
          cache: npm
          cache-dependency-path: package/w3geekery/sme-mart/package-lock.json

      - name: Import secrets
        uses: hashicorp/vault-action@v2.4.3
        with:
          method: jwt
          url: ${{ secrets.VAULT_ADDR }}
          role: publishing-role
          path: gh-actions
          secrets: |
            operations-kv/data/ci/github readPackagesToken | READ_TOKEN ;

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ env.READ_TOKEN }}
          GITHUB_TOKEN: ${{ env.READ_TOKEN }}
          ZB_TOKEN: ${{ secrets.ZB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
