name: Lint

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - uat
      - qa
      - prod

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package/w3geekery/sme-mart

    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package/w3geekery/sme-mart/.nvmrc

      - name: Install lint tooling (public npm only, no auth)
        run: |
          npm install --no-save \
            --registry=https://registry.npmjs.org \
            eslint \
            @angular-eslint/eslint-plugin \
            @angular-eslint/eslint-plugin-template \
            @angular-eslint/template-parser \
            @typescript-eslint/parser \
            @typescript-eslint/eslint-plugin \
            typescript \
            lint-staged

      - name: Lint changed files (diff-based)
        run: npx lint-staged --diff="origin/${{ github.base_ref || 'poc/sme-mart' }}...HEAD"
