<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A5F8F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8913A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A942;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M64 6 L118 28 L118 72 C118 108 64 124 64 124 C64 124 10 108 10 72 L10 28 Z"
        fill="url(#shieldGrad)" stroke="none"/>

  <!-- Inner shield highlight -->
  <path d="M64 18 L108 36 L108 70 C108 100 64 114 64 114 C64 114 20 100 20 70 L20 36 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Network nodes - connected experts -->
  <!-- Central node -->
  <circle cx="64" cy="60" r="10" fill="url(#accentGrad)"/>

  <!-- Surrounding nodes -->
  <circle cx="40" cy="38" r="7" fill="#E8913A" opacity="0.9"/>
  <circle cx="88" cy="38" r="7" fill="#E8913A" opacity="0.9"/>
  <circle cx="34" cy="78" r="7" fill="#E8913A" opacity="0.9"/>
  <circle cx="94" cy="78" r="7" fill="#E8913A" opacity="0.9"/>
  <circle cx="64" cy="96" r="7" fill="#E8913A" opacity="0.9"/>

  <!-- Connection lines from center -->
  <line x1="64" y1="60" x2="40" y2="38" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="64" y1="60" x2="88" y2="38" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="64" y1="60" x2="34" y2="78" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="64" y1="60" x2="94" y2="78" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="64" y1="60" x2="64" y2="96" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>

  <!-- Outer connections (peer network) -->
  <line x1="40" y1="38" x2="88" y2="38" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
  <line x1="40" y1="38" x2="34" y2="78" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
  <line x1="88" y1="38" x2="94" y2="78" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
  <line x1="34" y1="78" x2="64" y2="96" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
  <line x1="94" y1="78" x2="64" y2="96" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>

  <!-- Checkmark on central node -->
  <path d="M58 60 L62.5 65 L71 54" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>